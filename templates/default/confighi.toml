output_dir = "/mnt/w/training/output"
dataset    = "/mnt/w/training/massage/v3/dataset.hi.toml"

epochs = 100
save_every_n_epochs = 1

micro_batch_size_per_gpu = 1
pipeline_stages = 1
gradient_accumulation_steps = 1
gradient_clipping = 1.0
warmup_steps = 100

checkpoint_every_n_epochs = 5
activation_checkpointing = true
partition_method = "parameters"
save_dtype = "bfloat16"
caching_batch_size = 1
steps_per_print = 10
video_clip_mode = "single_beginning"


[model]
type = "wan"
ckpt_path = "/mnt/w/models/Stable-diffusion/wan/Wan2.2-T2V-A14B"
transformer_path = "/mnt/w/models/Stable-diffusion/wan/Wan2.2-T2V-A14B/high_noise_model"
dtype = "bfloat16"
transformer_dtype = "float8"
min_t = 0.875
max_t = 1.0


[adapter]
type = "lora"
rank = 32
dtype = "bfloat16"


[optimizer]
type = "AdamW8bitKahan"
lr = 8e-5
betas = [0.9, 0.95]
weight_decay = 0.0
stabilize = false

