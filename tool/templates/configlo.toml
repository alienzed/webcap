output_dir = "/mnt/w/training/output/runs"
dataset    = "/mnt/w/training/XX/dataset.lo.toml"

epochs = 150
save_every_n_epochs = 1

micro_batch_size_per_gpu = 1
pipeline_stages = 1
gradient_accumulation_steps = 1
gradient_clipping = 1.0
warmup_steps = 200

checkpoint_every_n_epochs = 3
activation_checkpointing = true
partition_method = "parameters"
save_dtype = "bfloat16"
caching_batch_size = 1
steps_per_print = 10
video_clip_mode = "single_beginning"

[model]
type = "wan"
ckpt_path = "/mnt/w/models/Stable-diffusion/wan/Wan2.2-T2V-A14B"
transformer_path = '/mnt/w/models/Stable-diffusion/wan/Wan2.2-T2V-A14B/low_noise_model'
dtype = "bfloat16"
transformer_dtype = "float8"
timestep_sample_method = 'logit_normal'
min_t = 0
max_t = 0.875

[adapter]
type = "lora"
rank = 32
dtype = "bfloat16"
dropout = 0.05

[optimizer]
type = "AdamW8bitKahan"
lr = 4e-5
betas = [0.9, 0.95]
weight_decay = 0.0
stabilize = false
