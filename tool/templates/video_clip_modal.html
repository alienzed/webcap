<div id="video-clip-modal" class="video-clip-modal hidden" aria-hidden="true">
    <div class="crop-modal-dialog video-clip-dialog">
        <div class="video-clip-layout">
            <div class="video-clip-player-panel">
                <div class="crop-modal-header">
                    <strong id="video-clip-title">Clip video</strong>
                    <button id="video-clip-cancel-x" type="button" title="Close" aria-label="Close video clip modal">x</button>
                </div>
                <div class="video-clip-player-wrap" style="position:relative;">
                    <video
                        id="video-clip-video"
                        controls
                        playsinline
                        preload="metadata"
                        style="display:block;width:100%;max-height:100%;background:#111;"
                    ></video>
                    <img
                        id="video-clip-crop-image"
                        class="video-clip-crop-image hidden"
                        alt="Crop overlay"
                        style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:auto;"
                        draggable="false"
                    >
                </div>
                <div class="video-clip-time-row">
                    <span>Current:
                        <span id="video-clip-current-time">0.000</span>s</span>
                    <button id="video-clip-crop-frame-btn" type="button" class="video-clip-extract-frame-btn">Crop This Frame</button>
                </div>
            </div>
            <!-- Removed video-clip-crop-panel: all cropping is now via Crop This Frame and crop modal -->
        </div>
        <div class="video-clip-form-grid">
            <div class="video-clip-form-label">Start</div>
            <div class="video-clip-form-label">Duration</div>
            <div class="video-clip-form-label">Output</div>
            <div class="video-clip-form-label">Controls</div>

            <div class="video-clip-start-group">
                <label for="video-clip-start-input" class="video-clip-accessible-label">Start (sec)</label>
                <input
                    id="video-clip-start-input"
                    type="number"
                    step="0.1"
                    min="0"
                    value="0"
                >
                <button id="video-clip-use-current-btn" type="button" class="video-clip-inline-btn">Use Current Time</button>
            </div>

            <div class="video-clip-duration-group">
                <label for="video-clip-duration-input" class="video-clip-accessible-label">Duration (sec)</label>
                <input
                    id="video-clip-duration-input"
                    type="number"
                    step="0.5"
                    min="0.1"
                    value="3.0"
                >
            </div>

            <div class="video-clip-output-group">
                <label for="video-clip-output-input" class="video-clip-accessible-label">Output Name</label>
                <input id="video-clip-output-input" type="text" value="">
            </div>

            <div class="video-clip-controls-group">
                <button id="video-clip-export-btn" type="button">Export</button>
                <button id="video-clip-cancel-btn" type="button">Cancel</button>
            </div>
        </div>
        <div id="video-clip-status" class="crop-status"></div>

    </div>
</div>
