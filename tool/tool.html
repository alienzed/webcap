<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Local Page Tool</title>
  <link rel="stylesheet" href="/static/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="app">
    <div class="panel stack">
      <button id="mode-switch-btn" type="button">Caption Mode</button>
      <div class="row-inline">
        <input id="new-page-name" type="text" placeholder="new page name">
        <button id="create-page-btn" type="button">Create</button>
      </div>
      <div class="row-inline row-equal">
        <button id="open-page-btn" type="button">Open Page</button>
        <button id="caption-up-btn" type="button" style="display:none">Up</button>
      </div>
      <button id="review-captions-btn" type="button" style="margin-bottom:8px">Review All Captions</button>
      <input id="page-filter" type="text" placeholder="filter pages">
      <div id="page-list" class="page-list"></div>
      <div id="drop-zone" class="drop-zone">
        Drop video here
        <div class="small">.mp4 .webm .ogg</div>
      </div>
      <div id="status" class="status"></div>
    </div>
    <div class="panel">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="panel">
      <iframe id="preview"></iframe>
    </div>
  </div>
  <script src="/static/js/debounce.js"></script>
  <script src="/static/js/editor.js"></script>
  <script src="/static/js/http.js"></script>
  <script src="/static/js/status.js"></script>
  <script src="/static/js/pages.js"></script>
  <script src="/static/js/media.js"></script>
  <script src="/static/js/mode_router.js"></script>
  <script src="/static/js/page_mode.js"></script>
  <script src="/static/js/caption_utils.js"></script>
  <script src="/static/js/caption_state.js"></script>
  <script src="/static/js/caption_ops.js"></script>
  <script src="/static/js/caption_list.js"></script>
  <script src="/static/js/dir_handle_store.js"></script>
  <script src="/static/js/stats_engine.js"></script>
  <script src="/static/js/stats_view.js"></script>
  <script src="/static/js/caption_review.js"></script>
  <script src="/static/js/caption_mode.js"></script>
  <script src="/static/js/stats_mode.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
