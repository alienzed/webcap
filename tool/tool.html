<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WebCap</title>
        <link rel="stylesheet" href="/static/css/bootstrap.min.css">
        <link rel="stylesheet" href="/static/css/styles.css">
        <link rel="stylesheet" href="/static/vendor/cropperjs/dist/cropper.min.css">
    </head>
    <body>
        <div class="app">
            <div class="panel stack">
                <div class="panel-scrollable">
                    <div id="caption-filter-row" class="filter-row">
                        <input id="media-filter" type="search" placeholder="filter">
                    </div>
                    <div id="caption-filter-count"></div>
                    <div class="media-list-wrapper">
                        <button
                            id="refresh-btn"
                            type="button"
                            title="Refresh directory"
                            class="refresh-btn-square floating-refresh"
                        >↻</button>
                        <div id="media-list-header">
                            <div
                                id="up-one-directory-row"
                                class="media-item folder-item header-item"
                                data-type="up"
                                style="display:none"
                            >
                                <div>⬆ Up One Directory</div>
                            </div>
                            <div id="current-folder-row" class="media-item folder-item header-item current-folder-item current-folder-bordered" data-type="current-folder">
                                <div>🗁
                                    <span id="current-folder-label"></span>
                                </div>
                            </div>
                        </div>
                        <div id="media-list" class="media-list with-stats-pane"></div>
                    </div>
                    <div class="stats-panel">                        
                        <button
                            id="focus-set-exit-btn"
                            type="button"
                            class="m8y"
                            style="display:none"
                        >Exit Set</button>
                        <div class="sidebar-action-strip">
                            <button
                                id="review-captions-btn"
                                type="button"
                                class="review-captions-btn hidden"
                            ><span class="btn-glyph" aria-hidden="true">&#9654;</span><span>Review Captions</span></button>
                        </div>
                        <div id="sidebar-workspace" class="sidebar-workspace hidden">
                            <div class="sidebar-tabs" role="tablist" aria-label="Set tools">
                                <button
                                    id="sidebar-tab-config-btn"
                                    type="button"
                                    class="sidebar-tab-btn"
                                    data-sidebar-tab="config"
                                    role="tab"
                                    aria-selected="false"
                                    aria-controls="primer-details"
                                    tabindex="-1"
                                >Config</button>
                                <button
                                    id="sidebar-tab-review-btn"
                                    type="button"
                                    class="sidebar-tab-btn active"
                                    data-sidebar-tab="review"
                                    role="tab"
                                    aria-selected="true"
                                    aria-controls="cation-review"
                                >Review</button>
                                <button
                                    id="sidebar-tab-train-btn"
                                    type="button"
                                    class="sidebar-tab-btn"
                                    data-sidebar-tab="train"
                                    role="tab"
                                    aria-selected="false"
                                    aria-controls="training-details"
                                    tabindex="-1"
                                >Train</button>
                            </div>
                            <div id="primer-details" class="sidebar-tab-pane hidden" role="tabpanel" aria-labelledby="sidebar-tab-config-btn" aria-hidden="true">
                                <div class="stats-controls">
                                    <label>Caption Template (multiline, placeholders like {subject})</label>
                                    <textarea id="primer-template" rows="4" placeholder="{subject}
                                          {view}
                                          {lighting}"></textarea>
                                    <label>Set Notes</label>
                                    <textarea id="set-notes-editor" rows="6" placeholder="Set notes..."></textarea>
                                    <details class="config-advanced">
                                        <summary>Advanced</summary>
                                        <div class="config-advanced-fields">
                                            <label>Defaults (key=value per line)</label>
                                            <textarea id="primer-defaults" rows="3" placeholder="lighting=soft light"></textarea>
                                            <label>Filename mappings (file:token =&gt; key=value)</label>
                                            <textarea id="primer-mappings" rows="4" placeholder="file:fd =&gt; view=face down
                                                  file:woman =&gt; subject=woman"></textarea>
                                            <div class="small">Applies automatically when a caption is empty.</div>
                                        </div>
                                    </details>
                                </div>
                            </div>
                            <div id="cation-review" class="sidebar-tab-pane" role="tabpanel" aria-labelledby="sidebar-tab-review-btn" aria-hidden="false">
                                <div class="stats-controls">
                                    <label>Required key phrase</label>
                                    <input id="stats-required-phrase" type="text" placeholder="e.g. subject name">
                                    <label>Balance phrases (one per line)</label>
                                    <textarea id="stats-phrases" rows="4" placeholder="face down
                                    face up
                                    front view
                                    back view"></textarea>
                                    <label>Rules (file:token =&gt; phrase or caption:phrase =&gt; phrase)</label>
                                    <textarea id="stats-token-rules" rows="4" placeholder="fd =&gt; face down
                                    file:fu =&gt; face up
                                    caption:front view =&gt; face"></textarea>
                                </div>
                            </div>
                            <div id="training-details" class="sidebar-tab-pane hidden" role="tabpanel" aria-labelledby="sidebar-tab-train-btn" aria-hidden="true">
                                <div class="training-controls">
                                    <div id="training-config-list" class="training-config-list">No config files.</div>
                                    <div class="training-actions">
                                        <button id="training-prepare-dataset-btn" type="button" class="training-btn training-autoset-btn" title="Sorts the files into Aspect Ratio folders while converting video to 16fps."><span class="btn-glyph" aria-hidden="true">&#8635;</span><span>Prepare Dataset</span></button>
                                        <div class="training-actions-secondary">
                                            <button id="training-generate-btn" type="button" class="training-btn" title="Generate config files"><span class="btn-glyph" aria-hidden="true">&#9881;</span><span>Generate</span></button>
                                            <button id="training-train-btn" type="button" class="training-btn" title="Run training"><span class="btn-glyph" aria-hidden="true">&#9002;</span><span>Train</span></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="status" class="status status-bar">
                    <span id="status-text" class="flex1"></span>
                    <button
                        id="console-toggle-btn"
                        type="button"
                        title="Show/hide console"
                        class="console-toggle-btn"
                    >&#x25B2;</button>
                </div>
            </div>
            <div class="panel editor-panel">
                <div class="editor-wrapper">
                    <textarea id="editor" spellcheck="true" placeholder="Caption text (.txt)"></textarea>
                    <div id="caption-checklist-panel" class="checklist-panel" style="display:none;">
                        <button id="checklist-close-btn" title="Close checklist" class="checklist-close-btn">×</button>
                        <div id="caption-helper-tabs" class="caption-helper-tabs">
                            <button
                                id="caption-helper-tab-requirements-btn"
                                class="caption-helper-tab-btn active"
                                data-caption-helper-tab="requirements"
                                type="button"
                            >Requirements</button>
                            <button
                                id="caption-helper-tab-phrases-btn"
                                class="caption-helper-tab-btn"
                                data-caption-helper-tab="phrases"
                                type="button"
                            >Phrases</button>
                            <button
                                id="caption-helper-tab-tags-btn"
                                class="caption-helper-tab-btn"
                                data-caption-helper-tab="tags"
                                type="button"
                            >Tags</button>
                            <button
                                id="caption-helper-tab-metadata-btn"
                                class="caption-helper-tab-btn"
                                data-caption-helper-tab="metadata"
                                type="button"
                            >Metadata</button>
                        </div>
                        <div id="caption-helper-tab-requirements" class="caption-helper-tab-pane">
                            <div class="caption-helper-section-title">Requirements</div>
                            <div class="checklist-input-row">
                                <input
                                    id="checklist-add-input"
                                    type="text"
                                    class="form-control"
                                    placeholder="Add requirement..."
                                >
                                <button id="checklist-add-btn" type="button">+</button>
                            </div>
                            <div id="checklist-items"></div>
                        </div>
                        <div id="caption-helper-tab-phrases" class="caption-helper-tab-pane hidden">
                            <div class="caption-helper-section-title">Phrases</div>
                            <div class="checklist-input-row">
                                <input
                                    id="phrase-copy-add-input"
                                    type="text"
                                    class="form-control"
                                    placeholder="Add phrase..."
                                >
                                <button id="phrase-copy-add-btn" type="button">+</button>
                            </div>
                            <div id="phrase-copy-items"></div>
                        </div>
                        <div id="caption-helper-tab-tags" class="caption-helper-tab-pane hidden">
                            <div class="caption-helper-section-title">Tags</div>
                            <div class="checklist-input-row">
                                <input id="item-tag-add-input" type="text" class="form-control" placeholder="Add tag...">
                                <button id="item-tag-add-btn" type="button">+</button>
                            </div>
                            <div id="item-tags-list"></div>
                        </div>
                        <div id="caption-helper-tab-metadata" class="caption-helper-tab-pane hidden">
                            <div class="caption-helper-section-title">Metadata</div>
                            <div id="item-metadata-list"></div>
                        </div>
                    </div>
                </div>
                <div id="console-panel"></div>
            </div>
            <div class="panel">
                <iframe id="preview" srcdoc="<!DOCTYPE html><html><head><meta charset='UTF-8'></head><body style='font-family:system-ui;padding:1rem;color:#666;'>Select a media file to preview.</body></html>"></iframe>
            </div>
            <div id="caption-list-actions" class="caption-list-actions">
                <button id="focus-set-exit-btn" type="button" style="display:none">Exit Set</button>
            </div>
        </div>
        <div id="crop-modal" class="crop-modal hidden" aria-hidden="true">
            <div class="crop-modal-dialog">
                <div class="crop-modal-header">
                    <strong id="crop-modal-title">Crop image</strong>
                    <button id="crop-cancel-x" type="button" title="Close">x</button>
                </div>
                <div class="crop-ratio-row">
                    <button type="button" class="crop-ratio-btn active" data-ratio="1">1:1</button>
                    <button type="button" class="crop-ratio-btn" data-ratio="1.3333333333">4:3</button>
                    <button type="button" class="crop-ratio-btn" data-ratio="1.7777777778">16:9</button>
                    <button type="button" class="crop-ratio-btn" data-ratio="0.5625">9:16</button>
                </div>
                <div class="crop-image-wrap">
                    <img id="crop-image" alt="Crop preview">
                </div>
                <div id="crop-size-readout" class="crop-size-readout">0 x 0 px</div>
                <div id="crop-status" class="crop-status"></div>
                <div class="crop-actions">
                    <button id="crop-apply-btn" type="button">Apply</button>
                    <button id="crop-cancel-btn" type="button">Cancel</button>
                </div>
            </div>
        </div>
        <!-- JS load order: shared globals first, feature files, then main.js wiring -->
        <script src="/static/js/constants.js"></script>
        <script src="/static/js/common.js"></script>
        <script src="/static/js/console_panel.js"></script>
        <script src="/static/js/ui.js"></script>
        <script src="/static/js/preview_pane.js"></script>
        <script src="/static/js/media.js"></script>
        <script src="/static/vendor/cropperjs/dist/cropper.min.js"></script>
        <script src="/static/js/crop.js"></script>
        <script src="/static/js/stats.js"></script>
        <script src="/static/js/folder_state.js"></script>
        <script src="/static/js/editor.js"></script>
        <script src="/static/js/checklist.js"></script>
        <script src="/static/js/caption_helpers.js"></script>
        <script src="/static/js/item_details.js"></script>
        <script src="/static/js/main.js"></script>
    </body>
</html>
