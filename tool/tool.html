<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WebCap</title>
        <link rel="stylesheet" href="/static/css/bootstrap.min.css">
        <link rel="stylesheet" href="/static/css/styles.css">
    </head>
    <body>
        <div class="app">
            <div class="panel stack">
                <div class="row-inline folder-label-row">
                    <input
                        id="folder-label"
                        type="text"
                        value="No folder selected"
                        placeholder=""
                        readonly
                        class="caption-folder-label"
                    >
                    <button id="refresh-btn" type="button" title="Refresh directory" class="refresh-btn-square">↻</button>
                </div>
                <div id="caption-filter-row" class="filter-row">
                    <input id="page-filter" type="text" placeholder="filter">
                    <button
                        id="caption-filter-clear-btn"
                        type="button"
                        title="Clear filter"
                        onclick="if (!document.getElementById('page-filter').value) { document.getElementById('page-filter').focus(); return; } document.getElementById('page-filter').value = ''; document.getElementById('page-filter').dispatchEvent(new Event('input', { bubbles: true }));"
                    >x</button>
                </div>
                <div id="media-list" class="media-list with-stats-pane"></div>
                <button id="review-captions-btn" type="button" style="margin-bottom:8px">Review Captions</button>
                <div id="caption-stats-pane">
                    <div class="stats-panel">
                        <details id="stats-details">
                            <summary>
                                <strong>Stats &amp; Validation</strong>
                            </summary>
                            <div class="stats-controls">
                                <label>Required key phrase</label>
                                <input id="stats-required-phrase" type="text" placeholder="e.g. subject name">
                                <label>Balance phrases (one per line)</label>
                                <textarea id="stats-phrases" rows="4" placeholder="face down
                                  face up
                                  front view
                                  back view">
                                </textarea>
                                <label>Rules (file:token =&gt; phrase or caption:phrase =&gt; phrase)</label>
                                <textarea id="stats-token-rules" rows="4" placeholder="fd =&gt; face down
                                  file:fu =&gt; face up
                                  caption:front view =&gt; face">
                                </textarea>
                                <button id="stats-run-btn" type="button">Update Review</button>
                                <button id="folder-settings-reset-btn" type="button" title="Delete .webcap_state.json for current folder">Reset Folder Settings</button>
                            </div>
                        </details>
                        <details id="primer-details">
                            <summary>
                                <strong>Template Primer</strong>
                            </summary>
                            <div class="stats-controls">
                                <label>Template (multiline, placeholders like {subject})</label>
                                <textarea id="primer-template" rows="4" placeholder="{subject}
                                  {view}
                                  {lighting}">
                                </textarea>
                                <label>Defaults (key=value per line)</label>
                                <textarea id="primer-defaults" rows="3" placeholder="lighting=soft light"></textarea>
                                <label>Filename mappings (file:token =&gt; key=value)</label>
                                <textarea id="primer-mappings" rows="4" placeholder="file:fd =&gt; view=face down
                                  file:woman =&gt; subject=woman">
                                </textarea>
                                <div class="small">Applies automatically when a caption is empty.</div>
                            </div>
                        </details>
                    </div>
                </div>
                <div id="status" class="status"></div>
            </div>
            <div class="panel">
                <textarea id="editor" spellcheck="true" placeholder="Caption text (.txt)"></textarea>
            </div>
            <div class="panel">
                <iframe id="preview" srcdoc="<!DOCTYPE html><html><head><meta charset='UTF-8'></head><body style='font-family:system-ui;padding:1rem;color:#666;'>Select a media file to preview.</body></html>"></iframe>
            </div>
            <div id="caption-list-actions" class="caption-list-actions">
              <button id="focus-set-exit-btn" type="button" style="display:none">Exit Set</button>
            </div>
        </div>
        <script src="/static/js/common.js"></script>
        <script src="/static/js/media.js"></script>
        <script src="/static/js/caption_core.js"></script>
        <script src="/static/js/stats.js"></script>
        <script src="/static/js/caption_ui.js"></script>
        <script src="/static/js/caption_mode.js"></script>
        <script src="/static/js/main.js"></script>
        <script>
        window.addEventListener('error', function(event) {
          console.error('Global error:', event.error || event.message);
        });
        window.addEventListener('unhandledrejection', function(event) {
          console.error('Unhandled promise rejection:', event.reason);
        });
        </script>
    </body>
</html>
